[tox]
requires =
    tox>=4.23
    tox-uv>=1.25
env_list = lint, unit

[testenv]
package = editable
set_env =
    PYTHONPATH = {tox_root}/lib:{tox_root}/src

[testenv:lint]
description = run all linters and pre-commit hooks
dependency_groups = test, integration
deps =
    pre-commit
commands =
    pre-commit run --all-files

[testenv:format]
description = auto-fix lint + format
skip_install = true
deps = ruff
commands =
    ruff check --fix {posargs:src tests lib}
    ruff format {posargs:src tests lib}

[testenv:unit]
description = run unit tests with coverage
dependency_groups = test
commands =
    coverage run -m pytest {posargs:tests/unit}
    coverage report

[testenv:integration]
description = run integration tests
dependency_groups = integration
# tox4 strips env vars by default; juju snap needs D-Bus to talk to snapd
pass_env =
    DBUS_SESSION_BUS_ADDRESS
commands =
    pytest {posargs:tests/integration} -v --tb=short

[testenv:build-dummy]
description = build the dummy-requirer test charm
skip_install = true
allowlist_externals =
    mkdir
    cp
    mv
    charmcraft
commands =
    mkdir -p {tox_root}/tests/integration/charms/dummy-requirer/lib/charms/role_distributor/v0
    cp {tox_root}/lib/charms/__init__.py {tox_root}/tests/integration/charms/dummy-requirer/lib/charms/__init__.py
    cp {tox_root}/lib/charms/role_distributor/__init__.py {tox_root}/tests/integration/charms/dummy-requirer/lib/charms/role_distributor/__init__.py
    cp {tox_root}/lib/charms/role_distributor/v0/__init__.py {tox_root}/tests/integration/charms/dummy-requirer/lib/charms/role_distributor/v0/__init__.py
    cp {tox_root}/lib/charms/role_distributor/v0/role_assignment.py {tox_root}/tests/integration/charms/dummy-requirer/lib/charms/role_distributor/v0/role_assignment.py
    charmcraft pack -p {tox_root}/tests/integration/charms/dummy-requirer
    mv {tox_root}/dummy-requirer_amd64.charm {tox_root}/tests/integration/charms/dummy-requirer/
